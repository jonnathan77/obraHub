<div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5><i class="bi bi-card-list"></i> Ocorrências</h5>
    <button class="btn btn-sm btn-primary" (click)="mostrarForm = !mostrarForm">
      <i class="bi bi-plus-circle"></i> Registrar Ocorrência
    </button>
  </div>

  <!-- Formulário de Adição -->
  <div *ngIf="mostrarForm" class="card mb-3 p-3 bg-light">
    <div class="mb-2">
      <input
        type="date"
        class="form-control"
        [(ngModel)]="novaOcorrencia.data">
    </div>
    <div class="mb-2">
      <textarea
        class="form-control"
        placeholder="Descrição do evento"
        rows="3"
        [(ngModel)]="novaOcorrencia.descricao"></textarea>
    </div>
    <div class="row mb-2">
      <div class="col-md-6">
        <input
          type="text"
          class="form-control"
          placeholder="Clima"
          [(ngModel)]="novaOcorrencia.clima">
      </div>
      <div class="col-md-6">
        <input
          type="text"
          class="form-control"
          placeholder="Equipe"
          [(ngModel)]="novaOcorrencia.equipe">
      </div>
    </div>
    <div class="mb-2">
      <textarea
        class="form-control"
        placeholder="Problemas encontrados"
        rows="2"
        [(ngModel)]="novaOcorrencia.problemas"></textarea>
    </div>
    <button class="btn btn-success me-2" (click)="adicionarOcorrencia()">Salvar</button>
    <button class="btn btn-secondary" (click)="mostrarForm = false">Cancelar</button>
  </div>

  <!-- Lista de Ocorrências -->
  <div *ngIf="ocorrencias.length > 0" class="timeline">
    <div *ngFor="let ocorrencia of ocorrencias" class="timeline-item">
      <div class="timeline-date">{{ ocorrencia.data | date:'dd/MM/yyyy' }}</div>
      <div class="timeline-content">
        <h6>{{ ocorrencia.descricao }}</h6>
        <div class="row mt-2">
          <div class="col-md-4" *ngIf="ocorrencia.clima">
            <small><strong>Clima:</strong> {{ ocorrencia.clima }}</small>
          </div>
          <div class="col-md-4" *ngIf="ocorrencia.equipe">
            <small><strong>Equipe:</strong> {{ ocorrencia.equipe }}</small>
          </div>
          <div class="col-md-4">
            <button class="btn btn-sm btn-danger float-end" (click)="deletarOcorrencia(ocorrencia)">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>
        <p *ngIf="ocorrencia.problemas" class="mt-2 mb-0">
          <strong>Problemas:</strong> {{ ocorrencia.problemas }}
        </p>
      </div>
    </div>
  </div>

  <div *ngIf="ocorrencias.length === 0" class="alert alert-info mt-3">
    Nenhuma ocorrência registrada
  </div>
</div>
