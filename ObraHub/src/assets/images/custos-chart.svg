<svg width="900" height="240" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gráfico Orçado vs Real">
  <rect width="900" height="240" fill="#0b1220"/>
  <g transform="translate(40,20)">
    <!-- grid lines -->
    <g stroke="#475569" stroke-dasharray="4 6">
      <line x1="0" y1="0" x2="820" y2="0" />
      <line x1="0" y1="40" x2="820" y2="40" />
      <line x1="0" y1="80" x2="820" y2="80" />
      <line x1="0" y1="120" x2="820" y2="120" />
      <line x1="0" y1="160" x2="820" y2="160" />
      <line x1="0" y1="200" x2="820" y2="200" />
    </g>

    <!-- bars grouped for months -->
    <!-- sample data for illustration -->
    <g transform="translate(0,0)">
      <!-- month 1 -->
      <g transform="translate(0,10)">
        <rect x="20" y="80" width="40" height="120" fill="#0d6efd" rx="6" />
        <rect x="70" y="90" width="40" height="110" fill="#8ec5ff" rx="6" />
      </g>
      <!-- month 2 -->
      <g transform="translate(120,10)">
        <rect x="20" y="60" width="40" height="140" fill="#0d6efd" rx="6" />
        <rect x="70" y="70" width="40" height="130" fill="#8ec5ff" rx="6" />
      </g>
      <!-- month 3 -->
      <g transform="translate(240,10)">
        <rect x="20" y="70" width="40" height="130" fill="#0d6efd" rx="6" />
        <rect x="70" y="78" width="40" height="122" fill="#8ec5ff" rx="6" />
      </g>
      <!-- month 4 -->
      <g transform="translate(360,10)">
        <rect x="20" y="20" width="40" height="180" fill="#0d6efd" rx="6" />
        <rect x="70" y="18" width="40" height="182" fill="#8ec5ff" rx="6" />
      </g>
      <!-- month 5 -->
      <g transform="translate(480,10)">
        <rect x="20" y="50" width="40" height="150" fill="#0d6efd" rx="6" />
        <rect x="70" y="60" width="40" height="140" fill="#8ec5ff" rx="6" />
      </g>
      <!-- month 6 -->
      <g transform="translate(600,10)">
        <rect x="20" y="0" width="40" height="200" fill="#0d6efd" rx="6" />
        <rect x="70" y="6" width="40" height="194" fill="#8ec5ff" rx="6" />
      </g>
    </g>

    <!-- months labels -->
    <g fill="#9aa4b2" font-size="12" transform="translate(0,210)">
      <text x="40">Jan</text>
      <text x="160">Fev</text>
      <text x="280">Mar</text>
      <text x="400">Abr</text>
      <text x="520">Mai</text>
      <text x="640">Jun</text>
    </g>
  </g>
</svg>