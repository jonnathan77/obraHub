<div class="login-page d-flex justify-content-center align-items-center">
  <div class="login-card text-center">
    <!-- logo/favicon above title -->
    <div class="logo mb-2">
      <!-- use absolute asset path so Angular will serve correctly -->
      <img
        src="/assets/images/ObraHub.png"
        alt="ObraHub"
        class="favicon-logo"
      />
    </div>
    <h2 class="app-name">ObraHub</h2>
    <p class="welcome">Bem-Vindo ao ObraHub</p>
    <p class="subtitle">Faça o login para continuar</p>

    <form (ngSubmit)="onSubmit()" [formGroup]="loginForm" class="mt-3">
      <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
        {{ errorMessage }}
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
        <input
          id="email"
          type="email"
          class="form-control"
          formControlName="email"
          placeholder="Seu email"
        />
      </div>

    <div class="input-group mb-3 position-relative">
  <span class="input-group-text"><i class="bi bi-lock"></i></span>

  <input
    id="senha"
    [type]="mostrarSenha ? 'text' : 'password'"
    class="form-control"
    formControlName="senha"
    placeholder="Sua senha"
  />

  <span class="password-toggle" (click)="toggleSenha()">
    <i class="bi" [ngClass]="mostrarSenha ? 'bi-eye-slash' : 'bi-eye'"></i>
  </span>
</div>

      <button type="submit" class="btn btn-login w-100" [disabled]="loading">
        <span *ngIf="loading">Entrando...</span>
        <span *ngIf="!loading">Entrar</span>
      </button>
    </form>

    <div class="text-center mt-3">
      <a
      style="cursor: pointer;"
        class="forgot-link"
        data-bs-toggle="modal"
        data-bs-target="#resetSenhaModal"
      >
        Esqueceu a senha?
      </a>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="resetSenhaModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Recuperar senha</h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
          ></button>
        </div>

        <div class="modal-body">
          <p>Digite seu email para receber o link de redefinição.</p>

          <input
            type="email"
            class="form-control"
            placeholder="Seu email"
            [(ngModel)]="emailReset"
          />
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">
            Cancelar
          </button>

          <button class="btn btn-primary" data-bs-dismiss="modal" (click)="enviarReset()">
            Enviar
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
