<div class="login-page d-flex justify-content-center align-items-center">
  <div class="login-card">
    <h2 class="app-name">ObraHub</h2>
    <p class="welcome">Bem Vindo ao ObraHub</p>
    <p class="subtitle">Faça o Login para continuar</p>

    <form (ngSubmit)="onSubmit()" [formGroup]="loginForm" class="mt-3">
      <div *ngIf="errorMessage" class="alert alert-danger" role="alert">{{ errorMessage }}</div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input id="email" type="email" class="form-control" formControlName="email" placeholder="seu@email.com" />
      </div>

      <div class="mb-3">
        <label for="senha" class="form-label">Senha</label>
        <input id="senha" type="password" class="form-control" formControlName="senha" placeholder="Senha" />
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
        <span *ngIf="loading">Entrando...</span>
        <span *ngIf="!loading">Entrar</span>
      </button>
    </form>

    <div class="text-center mt-3">
      <a class="forgot-link" href="#">Esqueci a senha</a>
    </div>
  </div>
</div>
