<div class="card p-4">
  <h4>Configurações da Empresa</h4>

  <form (ngSubmit)="salvar()" [formGroup]="form">
    <div class="mb-3">
      <label class="form-label">Perfil da Empresa</label>
      <input class="form-control" formControlName="perfil" placeholder="Nome do perfil" />
    </div>

    <div class="mb-3">
      <label class="form-label">Nome da Empresa</label>
      <input class="form-control" formControlName="nomeEmpresa" />
    </div>

    <div class="mb-3">
      <label class="form-label">Cor do Layout</label>
      <input type="color" class="form-control form-control-color" formControlName="corLayout" />
    </div>

    <div class="mb-3">
      <label class="form-label">Notificações</label>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" formControlName="notificacoes" id="notificacoes" />
        <label class="form-check-label" for="notificacoes">Ativar notificações por e-mail</label>
      </div>
    </div>

    <div class="mb-3">
      <h5>Usuários e permissões (placeholder)</h5>
      <p class="text-muted">Gerencie usuários, perfis e permissões aqui.</p>
    </div>

    <div class="mb-3">
      <h5>Tipos de tarefa (templates)</h5>
      <p class="text-muted">Crie templates de tarefas para reaproveitamento.</p>
    </div>

    <button class="btn btn-primary" type="submit">Salvar</button>
  </form>
</div>
