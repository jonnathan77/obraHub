<div class="page-materiais">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="bi bi-box-seam"></i> Materiais</h1>
    <button class="btn btn-primary" (click)="abrirNovo()">
      <i class="bi bi-plus-circle"></i> Novo Material
    </button>
  </div>

  <div *ngIf="error" class="alert alert-danger alert-dismissible fade show" role="alert">
    {{ error }}
    <button type="button" class="btn-close" (click)="error = null" aria-label="Fechar"></button>
  </div>

  <!-- Seleção de Obra -->
  <div class="card mb-3">
    <div class="card-body">
      <label class="form-label fw-semibold">Selecionar Obra</label>
      <select
        class="form-select"
        [(ngModel)]="obraSelecionadaId"
        (ngModelChange)="onObraChange($event)">
        <option value="">Selecione uma obra...</option>
        <option *ngFor="let o of obras" [value]="o.id">{{ o.name }}</option>
      </select>
    </div>
  </div>

  <div *ngIf="loading" class="card">
    <div class="card-body text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Carregando...</span>
      </div>
      <p class="mt-2 text-muted">Carregando materiais...</p>
    </div>
  </div>

  <div *ngIf="!loading" class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>Material</th>
            <th>Unidade</th>
            <th>Estoque atual</th>
            <th>Data criação</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let m of materiais">
            <td><strong>{{ m.nome }}</strong></td>
            <td>{{ m.unidade }}</td>
            <td>{{ m.estoque_atual | number:'1.2-2' }}</td>
            <td>{{ formatarData(m.data_criacao) }}</td>
            <td>
              <button class="btn btn-sm btn-outline-primary me-1" (click)="abrirEditar(m)" title="Editar">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger" (click)="excluir(m)" title="Excluir">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div *ngIf="materiais.length === 0" class="card-body text-center text-muted py-5">
      <i class="bi bi-inbox" style="font-size: 3rem;"></i>
      <p class="mt-3">Nenhum material cadastrado</p>
      <button class="btn btn-primary" (click)="abrirNovo()">
        <i class="bi bi-plus-circle"></i> Novo Material
      </button>
    </div>
  </div>

  <!-- Modal -->
  <div *ngIf="modalOpen" class="modal-overlay" (click)="fecharModal()">
    <div class="modal-dialog" (click)="$event.stopPropagation()">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">{{ editando ? 'Editar Material' : 'Novo Material' }}</h5>
          <button type="button" class="btn-close" (click)="fecharModal()" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" [(ngModel)]="form.nome" placeholder="Ex: Cimento" />
          </div>
          <div class="mb-3">
            <label class="form-label">Unidade</label>
            <select class="form-select" [(ngModel)]="form.unidade">
              <option *ngFor="let u of unidades" [value]="u">{{ u }}</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">{{ editando ? 'Estoque atual' : 'Estoque inicial' }}</label>
            <input type="number" class="form-control" [(ngModel)]="form.estoque_inicial" min="0" step="0.01" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="fecharModal()" [disabled]="salvando">Cancelar</button>
          <button type="button" class="btn btn-primary" (click)="salvar()" [disabled]="salvando">
            <span *ngIf="salvando" class="spinner-border spinner-border-sm me-1"></span>
            {{ salvando ? 'Salvando...' : 'Salvar' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
